packages:
  - .
  - ui
  - packages/*
  - extensions/*

minimumReleaseAge: 2880

overrides:
  '@hono/node-server': 1.19.13
  hono: 4.12.25
  fast-xml-parser: 5.7.0
  axios: 1.16.0
  basic-ftp: 5.3.1
  brace-expansion: 5.0.6
  '@grpc/grpc-js': 1.14.4
  defu: 6.1.5
  file-type: 21.3.2
  fast-uri: 3.1.2
  request: npm:@cypress/request@3.0.10
  request-promise: npm:@cypress/request-promise@5.0.0
  form-data: 2.5.6
  lodash: 4.18.1
  linkify-it: 5.0.1
  minimatch: 10.2.4
  path-to-regexp@0.1.12: 0.1.13
  path-to-regexp@8.3.0: 8.4.0
  picomatch: 4.0.4
  postcss: 8.5.10
  protobufjs@7.5.4: 7.6.3
  protobufjs@8.0.0: 8.5.1
  qs: 6.15.2
  node-domexception: npm:@nolyfill/domexception@^1.0.28
  '@sinclair/typebox': 0.34.48
  simple-git: 3.36.0
  tar: 7.5.19
  tough-cookie: 4.1.3
  undici: 7.28.0
  ws: 8.21.0
  yaml: 2.9.0

onlyBuiltDependencies:
  - "@lydell/node-pty"
  - "@matrix-org/matrix-sdk-crypto-nodejs"
  - "@napi-rs/canvas"
  - "@whiskeysockets/baileys"
  - authenticate-pam
  - esbuild
  - node-llama-cpp
  - protobufjs
  - sharp

allowBuilds:
  '@discordjs/opus': set this to true or false
  '@matrix-org/matrix-sdk-crypto-nodejs': set this to true or false
  '@whiskeysockets/baileys': set this to true or false
  esbuild: set this to true or false
  koffi: set this to true or false
  node-llama-cpp: set this to true or false
  protobufjs: set this to true or false
  sharp: set this to true or false
